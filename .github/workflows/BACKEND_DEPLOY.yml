name: backend Deploy
on:
  push:
    branches: [ main ]
    paths:
      - 'packages/backend/**'
      - 'packages/shared/**'
jobs:
  push_to_registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to NCP Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NCP_CONTAINER_REGISTRY }}
          username: ${{ secrets.NCP_ACCESS_KEY }}
          password: ${{ secrets.NCP_SECRET_KEY }}
      - name: Build and Push
        uses: docker/build-push-action@v3
        with:
            context: .
            file: ./packages/backend/Dockerfile
            push: true
            tags: ${{secrets.CONTAINER_REGISTRY_URL}}/nodejs-server:latest
            cache-from: type=registry, ref=${{ secrets.CONTAINER_REGISTRY_URL }}/prv-backend:latest
            cache-to: type=inline
      # 배포 결과 처리
      - name: Process Deploy Result
        uses: actions/github-script@v6
        with:
          script: |
            const sharedOutcome = '${{ steps.build-shared.outcome }}';
            const deployOutcome = '${{ steps.deploy.outcome }}';
            const finalOutcome = sharedOutcome === 'success' && deployOutcome === 'success' ? 'success' : 'failure';
            
            // GitHub Checks로 배포 상태 보고
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.name,
              name: 'backend Deploy',
              head_sha: context.sha,
              status: 'completed',
              conclusion: finalOutcome === 'success' ? 'success' : 'failure',
              output: {
                title: finalOutcome === 'success' 
                  ? '🚀 backend Deploy Successful' 
                  : '❌ backend Deploy Failed',
                summary: finalOutcome === 'success'
                  ? [
                      '## ✅ Deploy Status: Success',
                      '',
                      '### Build & Deploy Information:',
                      '- **Time**: ' + new Date().toISOString(),
                      '- **Environment**: Production',
                      '- **Packages Built**: shared, backend',
                      '- **Target**: NCP Object Storage',
                      '',
                      '🎉 Successfully deployed to production!'
                    ].join('\n')
                  : [
                      '## ❌ Deploy Status: Failed',
                      '',
                      '### Error 정보:',
                      '- **Time**: ' + new Date().toISOString(),
                      '- **Failed Step**: ' + (sharedOutcome === 'failure' ? 'Shared Package Build' : 'backend Deploy'),
                      '',
                      '### Error 부가정보:',
                      sharedOutcome === 'failure' 
                        ? '- Shared package build failed. Check the shared package build logs.'
                        : '- backend deployment failed. Check the deployment logs.',
                      '',
                    ].join('\n')
              }
            });
            
            // 실패 시 워크플로우를 실패 상태로 만듦
            if (finalOutcome === 'failure') {
              core.setFailed('Deployment process failed');
            }
  pull_from_registry:
    name: Connect server ssh and pull from container registry
    needs: push_to_registry
    runs-on: ubuntu-latest
    steps:
      - name: connect ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          password: ${{ secrets.DEV_PASSWORD }}
          port: ${{ secrets.DEV_PORT }}
          script: |
            docker pull ${{ secrets.NCP_CONTAINER_REGISTRY }}/tag-name
            docker stop $(docker ps -a -q)
            docker rm $(docker ps -a -q)
            docker run -d -p 3000:80 --env-file ${{ secrets.ENV_FILENAME_FRONTEND }} ${{ secrets.NCP_CONTAINER_REGISTRY }}/tag-name
            docker image prune -f